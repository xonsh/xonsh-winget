# Build xonsh installer from the latest commit on xonsh/xonsh main branch.
# Run manually: Actions -> "Dev Build (xonsh main)" -> Run workflow.
# The unsigned installer is uploaded as an artifact.

name: Dev Build (xonsh main)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install .

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer from xonsh main
        shell: bash
        run: |
          xonsh build.xsh build --git --version dev
          xonsh build.xsh installer --version dev --include-inno-tag

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: xonsh-dev-win-x64-setup
          path: dist/xonsh-*-setup.exe
