# Build xonsh installer from the latest commit on xonsh/xonsh main branch,
# using Inno Setup 5 (instead of 6).
# Run manually: Actions -> "Dev Build (xonsh main, Inno Setup 5)" -> Run workflow.
# The unsigned installer is uploaded as an artifact.

name: Dev Build (xonsh main, Inno Setup 5)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install .

      - name: Install Inno Setup 5
        shell: pwsh
        run: |
          $url = "https://files.jrsoftware.org/is/5/innosetup-5.6.1.exe"
          $exe = "$env:RUNNER_TEMP\innosetup5.exe"
          Invoke-WebRequest -Uri $url -OutFile $exe
          Start-Process -FilePath $exe -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/SP-' -Wait

      - name: Build installer from xonsh main
        shell: bash
        run: |
          # Python 3.10 is the last version supporting Windows 8.1
          # (3.11+ requires Windows 10+).
          xonsh build.xsh build --git --version dev --python-version 3.10.11
          xonsh build.xsh installer --version dev

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: xonsh-dev-inno5-win-x64-setup
          path: dist/xonsh-*-setup.exe
